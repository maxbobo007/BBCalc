<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>计算换算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #000000;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 428px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 状态栏区域 */
        .status-bar {
            height: 47px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* 导航栏 */
        .nav-bar {
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px 16px 20px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .settings-btn {
            position: absolute;
            right: 20px;
            top: 12px;
            background: rgba(99, 99, 102, 0.5);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: background 0.2s;
        }

        .settings-btn:active {
            background: rgba(99, 99, 102, 0.8);
        }

        .nav-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 8px;
        }

        .active-currency-badge {
            display: inline-block;
            background: rgba(10, 132, 255, 0.15);
            color: #0A84FF;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* 货币选择器 - iOS风格 */
        .currency-selector {
            background: rgba(44, 44, 46, 0.9);
            border-radius: 10px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .currency-selector label {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        .currency-selector select {
            background: transparent;
            border: none;
            color: #0A84FF;
            font-size: 17px;
            font-weight: 600;
            padding: 8px 4px 8px 8px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        .currency-selector select:focus {
            outline: none;
        }

        /* 主内容区 */
        .content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 显示屏 - iOS计算器风格 */
        .display {
            background: rgba(28, 28, 30, 0.95);
            border-radius: 20px;
            padding: 24px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .expression {
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            margin-bottom: 8px;
            min-height: 24px;
            text-align: right;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .result {
            font-size: 64px;
            font-weight: 200;
            color: white;
            text-align: right;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        /* 换算结果列表 - iOS列表风格 */
        .conversion-list {
            background: rgba(28, 28, 30, 0.95);
            border-radius: 20px;
            overflow: hidden;
            max-height: 320px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .conversion-list::-webkit-scrollbar {
            display: none;
        }

        .conversion-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .conversion-row:last-child {
            border-bottom: none;
        }

        .conversion-row:active {
            background-color: rgba(10, 132, 255, 0.2);
        }

        .conversion-row.clickable:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .conversion-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .currency-code {
            font-size: 17px;
            font-weight: 600;
            color: white;
            min-width: 45px;
        }

        .currency-name {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
        }

        .conversion-value {
            font-size: 20px;
            font-weight: 600;
            color: #0A84FF;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selected-indicator {
            width: 8px;
            height: 8px;
            background: #0A84FF;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* 计算器按钮 - iOS风格 */
        .calculator {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 34px; /* 为home indicator留空间 */
        }

        .button-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-button {
            aspect-ratio: 1;
            border: none;
            border-radius: 50%;
            font-size: 32px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: rgba(99, 99, 102, 1);
            -webkit-user-select: none;
            user-select: none;
        }

        .calc-button:active {
            opacity: 0.5;
        }

        .calc-button.function {
            background: rgba(58, 58, 60, 1);
            color: white;
            font-size: 28px;
        }

        .calc-button.operator {
            background: #FF9F0A;
            color: white;
            font-size: 38px;
            font-weight: 300;
        }

        .calc-button.zero {
            grid-column: span 2;
            border-radius: 50px;
            aspect-ratio: 2.2 / 1;
            justify-content: flex-start;
            padding-left: 32px;
        }

        .calc-button.equals {
            background: #0A84FF;
        }

        /* 汇率信息 */
        .rate-info {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            padding: 8px 20px 20px 20px;
            font-weight: 400;
        }

        .update-btn {
            background: none;
            border: none;
            color: #0A84FF;
            cursor: pointer;
            font-size: 11px;
            margin-top: 4px;
            padding: 4px;
        }

        /* Home Indicator */
        .home-indicator {
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-indicator-bar {
            width: 134px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 100px;
        }

        /* 响应式调整 */
        @media (max-width: 390px) {
            .result {
                font-size: 56px;
            }

            .calc-button {
                font-size: 28px;
            }

            .button-row {
                gap: 10px;
            }

            .calculator {
                gap: 10px;
            }
        }

        @media (min-height: 800px) {
            .conversion-list {
                max-height: 400px;
            }
        }

        /* 设置面板 */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .settings-overlay.active {
            display: flex;
        }

        .settings-panel {
            background: rgba(28, 28, 30, 0.98);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .settings-title {
            font-size: 28px;
            font-weight: 700;
        }

        .close-btn {
            background: rgba(99, 99, 102, 0.5);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
        }

        .section-title {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 12px 0;
            font-weight: 600;
        }

        .currency-item {
            background: rgba(44, 44, 46, 0.8);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .currency-item:active {
            background: rgba(44, 44, 46, 1);
        }

        .currency-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .drag-handle {
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            cursor: grab;
        }

        .currency-details {
            display: flex;
            flex-direction: column;
        }

        .currency-item-code {
            font-size: 17px;
            font-weight: 600;
            color: white;
        }

        .currency-item-name {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* iOS风格开关 */
        .toggle-switch {
            position: relative;
            width: 51px;
            height: 31px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(99, 99, 102, 1);
            transition: 0.3s;
            border-radius: 31px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 27px;
            width: 27px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #34C759;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .add-currency-btn {
            background: rgba(10, 132, 255, 0.15);
            border: 2px dashed #0A84FF;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            color: #0A84FF;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .add-currency-btn:active {
            background: rgba(10, 132, 255, 0.25);
            transform: scale(0.98);
        }

        .available-currencies {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .currency-chip {
            background: rgba(44, 44, 46, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 10px 12px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .currency-chip:active {
            background: #0A84FF;
            border-color: #0A84FF;
            transform: scale(0.95);
        }

        .currency-chip.added {
            background: rgba(99, 99, 102, 0.5);
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 状态栏 -->
        <div class="status-bar"></div>

        <!-- 导航栏 -->
        <div class="nav-bar">
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
            <div class="nav-title">
                计算器
                <span class="active-currency-badge" id="activeCurrencyBadge">CNY</span>
            </div>
            <div class="currency-selector">
                <label>基准货币</label>
                <select id="baseCurrency">
                    <option value="CNY" selected>CNY</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="JPY">JPY</option>
                    <option value="HKD">HKD</option>
                    <option value="AUD">AUD</option>
                    <option value="CAD">CAD</option>
                    <option value="SGD">SGD</option>
                    <option value="KRW">KRW</option>
                </select>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="content">
            <!-- 显示屏 -->
            <div class="display">
                <div class="expression" id="expression"></div>
                <div class="result" id="result">0</div>
            </div>

            <!-- 换算结果列表 -->
            <div class="conversion-list" id="conversion">
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('USD', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">USD</span>
                        <span class="currency-name">美元</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('EUR', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">EUR</span>
                        <span class="currency-name">欧元</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('GBP', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">GBP</span>
                        <span class="currency-name">英镑</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('JPY', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">JPY</span>
                        <span class="currency-name">日元</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('HKD', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">HKD</span>
                        <span class="currency-name">港币</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('AUD', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">AUD</span>
                        <span class="currency-name">澳元</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('CAD', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">CAD</span>
                        <span class="currency-name">加元</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('SGD', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">SGD</span>
                        <span class="currency-name">新币</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
                <div class="conversion-row clickable" onclick="switchToConvertedCurrency('KRW', 0)">
                    <div class="conversion-label">
                        <span class="currency-code">KRW</span>
                        <span class="currency-name">韩元</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                </div>
            </div>

            <!-- 计算器按钮 -->
            <div class="calculator">
                <div class="button-row">
                    <button class="calc-button function" onclick="clearCalc()">C</button>
                    <button class="calc-button function" onclick="toggleSign()">+/−</button>
                    <button class="calc-button function" onclick="percentage()">%</button>
                    <button class="calc-button operator" onclick="append('/')">÷</button>
                </div>

                <div class="button-row">
                    <button class="calc-button" onclick="append('7')">7</button>
                    <button class="calc-button" onclick="append('8')">8</button>
                    <button class="calc-button" onclick="append('9')">9</button>
                    <button class="calc-button operator" onclick="append('*')">×</button>
                </div>

                <div class="button-row">
                    <button class="calc-button" onclick="append('4')">4</button>
                    <button class="calc-button" onclick="append('5')">5</button>
                    <button class="calc-button" onclick="append('6')">6</button>
                    <button class="calc-button operator" onclick="append('-')">−</button>
                </div>

                <div class="button-row">
                    <button class="calc-button" onclick="append('1')">1</button>
                    <button class="calc-button" onclick="append('2')">2</button>
                    <button class="calc-button" onclick="append('3')">3</button>
                    <button class="calc-button operator" onclick="append('+')">+</button>
                </div>

                <div class="button-row">
                    <button class="calc-button zero" onclick="append('0')">0</button>
                    <button class="calc-button" onclick="append('.')">.</button>
                    <button class="calc-button equals operator" onclick="calculate()">=</button>
                </div>
            </div>
        </div>

        <!-- 汇率信息 -->
        <div class="rate-info" id="rateInfo">
            正在加载汇率...<br>
            <button class="update-btn" onclick="fetchRates()">手动更新</button>
        </div>

        <!-- Home Indicator -->
        <div class="home-indicator">
            <div class="home-indicator-bar"></div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsIfOutside(event)">
        <div class="settings-panel" onclick="event.stopPropagation()">
            <div class="settings-header">
                <div class="settings-title">货币设置</div>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>

            <div class="section-title">已显示货币</div>
            <div id="activeCurrenciesList"></div>

            <div class="section-title">添加更多货币</div>
            <button class="add-currency-btn" onclick="toggleAvailableCurrencies()">
                <span id="addBtnText">+ 添加货币</span>
            </button>
            <div id="availableCurrenciesGrid" style="display: none;"></div>
        </div>
    </div>

    <script>
        let exchangeRates = {
            USD: 1,
            EUR: 0.92,
            GBP: 0.79,
            JPY: 149.50,
            CNY: 7.24,
            HKD: 7.82,
            AUD: 1.55,
            CAD: 1.39,
            SGD: 1.35,
            KRW: 1340.50
        };
        
        let expression = '';
        let result = 0;
        let lastUpdate = new Date();
        let usingOfflineRates = true;
        let activeCurrency = 'CNY'; // 当前激活的计算货币
        let rateSource = '内置数据'; // 汇率来源

        // 所有可用的货币列表
        const allCurrencies = {
            'USD': '美元',
            'EUR': '欧元',
            'GBP': '英镑',
            'JPY': '日元',
            'CNY': '人民币',
            'HKD': '港币',
            'AUD': '澳元',
            'CAD': '加元',
            'SGD': '新币',
            'KRW': '韩元',
            'CHF': '瑞士法郎',
            'SEK': '瑞典克朗',
            'NOK': '挪威克朗',
            'DKK': '丹麦克朗',
            'NZD': '新西兰元',
            'MXN': '墨西哥比索',
            'BRL': '巴西雷亚尔',
            'INR': '印度卢比',
            'RUB': '俄罗斯卢布',
            'ZAR': '南非兰特',
            'THB': '泰铢',
            'MYR': '马来西亚林吉特',
            'IDR': '印尼盾',
            'PHP': '菲律宾比索',
            'VND': '越南盾',
            'TWD': '新台币',
            'TRY': '土耳其里拉',
            'SAR': '沙特里亚尔',
            'AED': '阿联酋迪拉姆',
            'PLN': '波兰兹罗提'
        };

        // 用户选择的显示货币列表（从localStorage读取，默认前9个）
        let displayCurrencies = JSON.parse(localStorage.getItem('displayCurrencies')) || 
            ['USD', 'EUR', 'GBP', 'JPY', 'HKD', 'AUD', 'CAD', 'SGD', 'KRW'];

        async function fetchRates() {
            const rateInfo = document.getElementById('rateInfo');
            rateInfo.innerHTML = '更新中...<br><button class="update-btn" onclick="fetchRates()">手动更新</button>';

            const APIs = [
                {
                    url: 'https://api.exchangerate.host/latest?base=USD',
                    parser: (data) => data.rates,
                    name: 'ExchangeRate.host'
                },
                {
                    url: 'https://api.frankfurter.app/latest?from=USD',
                    parser: (data) => data.rates,
                    name: 'Frankfurter (ECB)'
                },
                {
                    url: 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json',
                    parser: (data) => data.usd,
                    name: 'Currency API'
                }
            ];

            for (let api of APIs) {
                try {
                    // 使用Promise.race实现超时
                    const fetchPromise = fetch(api.url, { method: 'GET' });
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('Timeout')), 8000)
                    );
                    
                    const response = await Promise.race([fetchPromise, timeoutPromise]);
                    
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    const rates = api.parser(data);
                    
                    if (rates && Object.keys(rates).length > 10) {
                        const normalizedRates = {};
                        Object.keys(rates).forEach(key => {
                            normalizedRates[key.toUpperCase()] = rates[key];
                        });
                        
                        exchangeRates = { ...exchangeRates, ...normalizedRates };
                        lastUpdate = new Date();
                        usingOfflineRates = false;
                        rateSource = api.name; // 记录来源
                        updateRateInfo();
                        updateConversion();
                        return;
                    }
                } catch (error) {
                    continue;
                }
            }
            
            usingOfflineRates = true;
            rateSource = '内置数据';
            lastUpdate = new Date();
            updateRateInfo();
            updateConversion();
        }

        function updateRateInfo() {
            const timeStr = lastUpdate.toLocaleString('zh-CN');
            const status = usingOfflineRates ? '离线汇率' : '实时汇率';
            const rateInfo = document.getElementById('rateInfo');
            rateInfo.innerHTML = `
                ${timeStr} (${status})<br>
                数据来源: <span style="color: #0A84FF; font-weight: 600">${rateSource}</span><br>
                <button class="update-btn" onclick="fetchRates()">手动更新</button>
            `;
        }

        function append(value) {
            if (expression === '0' && value !== '.') {
                expression = value;
            } else {
                expression += value;
            }
            updateDisplay();
        }

        function clearCalc() {
            expression = '';
            result = 0;
            updateDisplay();
        }

        function toggleSign() {
            if (result !== 0) {
                result = -result;
                expression = result.toString();
                updateDisplay();
            }
        }

        function percentage() {
            if (result !== 0) {
                result = result / 100;
                expression = result.toString();
                updateDisplay();
            }
        }

        function calculate() {
            try {
                let calcExpression = expression
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');
                
                result = Function('"use strict"; return (' + calcExpression + ')')();
                
                if (!isFinite(result)) {
                    result = 0;
                    expression = '错误';
                } else {
                    expression = result.toString();
                }
            } catch (error) {
                result = 0;
                expression = '错误';
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('expression').textContent = expression || '';
            
            // 实时计算
            let currentValue = result;
            if (expression && expression !== '错误') {
                try {
                    let calcExpression = expression
                        .replace(/×/g, '*')
                        .replace(/÷/g, '/')
                        .replace(/−/g, '-');
                    
                    currentValue = Function('"use strict"; return (' + calcExpression + ')')();
                    if (!isFinite(currentValue)) {
                        currentValue = 0;
                    }
                } catch (error) {
                    currentValue = 0;
                }
            }
            
            // 格式化结果显示
            const displayValue = Math.abs(currentValue) >= 1e9 ? currentValue.toExponential(2) : 
                                 currentValue.toString().length > 9 ? currentValue.toFixed(2) : 
                                 currentValue.toString();
            
            document.getElementById('result').textContent = displayValue;
            result = currentValue;
            
            updateConversion();
        }

        function updateConversion() {
            const baseCurrency = document.getElementById('baseCurrency').value;
            
            if (result !== 0 && exchangeRates[baseCurrency]) {
                const amountInUSD = result / exchangeRates[baseCurrency];
                
                // 遍历用户选择的货币列表
                displayCurrencies.forEach((currency, index) => {
                    const row = document.querySelectorAll('.conversion-row')[index];
                    if (!row) return;
                    
                    if (currency === baseCurrency) {
                        // 隐藏当前基准货币
                        row.style.display = 'none';
                    } else if (exchangeRates[currency]) {
                        const converted = amountInUSD * exchangeRates[currency];
                        const formattedValue = converted.toLocaleString('zh-CN', {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        });
                        
                        row.style.display = 'flex';
                        const valueSpan = row.querySelector('.conversion-value');
                        
                        // 清除旧的指示器
                        const oldIndicator = valueSpan.querySelector('.selected-indicator');
                        if (oldIndicator) oldIndicator.remove();
                        
                        // 更新数值
                        const selectedIndicator = currency === activeCurrency ? '<span class="selected-indicator"></span>' : '';
                        valueSpan.innerHTML = `${formattedValue} ${selectedIndicator}`;
                        
                        // 更新点击事件
                        row.onclick = () => switchToConvertedCurrency(currency, converted);
                    } else {
                        // 汇率未加载时显示0
                        row.style.display = 'flex';
                        const valueSpan = row.querySelector('.conversion-value');
                        valueSpan.innerHTML = '0.00';
                    }
                });
            } else {
                // 显示所有货币，数值为0
                displayCurrencies.forEach((currency, index) => {
                    const row = document.querySelectorAll('.conversion-row')[index];
                    if (!row) return;
                    
                    if (currency === baseCurrency) {
                        row.style.display = 'none';
                    } else {
                        row.style.display = 'flex';
                        const valueSpan = row.querySelector('.conversion-value');
                        valueSpan.innerHTML = '0.00';
                        row.onclick = () => switchToConvertedCurrency(currency, 0);
                    }
                });
            }
        }

        // 切换到换算后的货币进行计算
        function switchToConvertedCurrency(currency, value) {
            // 如果值为0，不做切换
            if (value === 0) return;
            
            // 获取当前的基准货币
            const oldCurrency = document.getElementById('baseCurrency').value;
            
            // 如果点击的就是当前货币，不做任何操作
            if (currency === oldCurrency) return;
            
            // 更新基准货币和激活货币
            document.getElementById('baseCurrency').value = currency;
            activeCurrency = currency;
            
            // 更新激活货币标识
            document.getElementById('activeCurrencyBadge').textContent = currency;
            
            // 将换算后的值带到显示框
            result = value;
            expression = value.toFixed(2);
            
            // 更新显示
            document.getElementById('result').textContent = value.toFixed(2);
            document.getElementById('expression').textContent = '';
            
            // 更新换算列表（会基于新的基准货币重新计算所有换算结果）
            updateConversion();
            
            // 添加触觉反馈（如果支持）
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }

        // 键盘支持
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') {
                append(e.key);
            } else if (e.key === '.') {
                append('.');
            } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                append(e.key);
            } else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearCalc();
            } else if (e.key === '%') {
                percentage();
            }
        });

        // 监听货币选择变化
        document.getElementById('baseCurrency').addEventListener('change', function() {
            activeCurrency = this.value;
            document.getElementById('activeCurrencyBadge').textContent = activeCurrency;
            updateConversion();
        });

        // 页面加载时获取汇率
        fetchRates();

        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // ========== 货币设置功能 ==========

        // 打开设置面板
        function openSettings() {
            document.getElementById('settingsOverlay').classList.add('active');
            renderActiveCurrencies();
            renderAvailableCurrencies();
        }

        // 关闭设置面板
        function closeSettings() {
            document.getElementById('settingsOverlay').classList.remove('active');
            document.getElementById('availableCurrenciesGrid').style.display = 'none';
            document.getElementById('addBtnText').textContent = '+ 添加货币';
        }

        // 点击外部关闭
        function closeSettingsIfOutside(event) {
            if (event.target.id === 'settingsOverlay') {
                closeSettings();
            }
        }

        // 渲染已激活的货币列表
        function renderActiveCurrencies() {
            const container = document.getElementById('activeCurrenciesList');
            container.innerHTML = '';

            displayCurrencies.forEach((code, index) => {
                const item = document.createElement('div');
                item.className = 'currency-item';
                item.draggable = true;
                item.dataset.code = code;
                
                item.innerHTML = `
                    <div class="currency-info">
                        <span class="drag-handle">☰</span>
                        <div class="currency-details">
                            <div class="currency-item-code">${code}</div>
                            <div class="currency-item-name">${allCurrencies[code]}</div>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" checked onchange="toggleCurrency('${code}', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                `;

                // 拖拽事件
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);
                item.addEventListener('dragend', handleDragEnd);

                container.appendChild(item);
            });
        }

        // 切换货币显示
        function toggleCurrency(code, isChecked) {
            if (!isChecked) {
                displayCurrencies = displayCurrencies.filter(c => c !== code);
            } else if (!displayCurrencies.includes(code)) {
                displayCurrencies.push(code);
            }
            
            localStorage.setItem('displayCurrencies', JSON.stringify(displayCurrencies));
            rebuildConversionList();
            updateConversion();
        }

        // 渲染可添加的货币
        function renderAvailableCurrencies() {
            const container = document.getElementById('availableCurrenciesGrid');
            container.innerHTML = '';

            Object.keys(allCurrencies).forEach(code => {
                if (code === 'CNY') return; // 跳过基准货币CNY
                
                const chip = document.createElement('div');
                chip.className = 'currency-chip' + (displayCurrencies.includes(code) ? ' added' : '');
                chip.textContent = code;
                chip.onclick = () => addCurrency(code);
                container.appendChild(chip);
            });
        }

        // 切换显示可添加货币列表
        function toggleAvailableCurrencies() {
            const grid = document.getElementById('availableCurrenciesGrid');
            const btnText = document.getElementById('addBtnText');
            
            if (grid.style.display === 'none') {
                grid.style.display = 'grid';
                btnText.textContent = '收起';
            } else {
                grid.style.display = 'none';
                btnText.textContent = '+ 添加货币';
            }
        }

        // 添加货币
        function addCurrency(code) {
            if (!displayCurrencies.includes(code)) {
                displayCurrencies.push(code);
                localStorage.setItem('displayCurrencies', JSON.stringify(displayCurrencies));
                renderActiveCurrencies();
                renderAvailableCurrencies();
                rebuildConversionList();
                updateConversion();
            }
        }

        // 拖拽排序相关
        let draggedItem = null;

        function handleDragStart(e) {
            draggedItem = this;
            this.style.opacity = '0.4';
        }

        function handleDragOver(e) {
            e.preventDefault();
            return false;
        }

        function handleDrop(e) {
            e.stopPropagation();
            
            if (draggedItem !== this) {
                const allItems = [...document.querySelectorAll('.currency-item')];
                const draggedIndex = allItems.indexOf(draggedItem);
                const targetIndex = allItems.indexOf(this);
                
                // 重新排序数组
                const [removed] = displayCurrencies.splice(draggedIndex, 1);
                displayCurrencies.splice(targetIndex, 0, removed);
                
                localStorage.setItem('displayCurrencies', JSON.stringify(displayCurrencies));
                renderActiveCurrencies();
                rebuildConversionList();
                updateConversion();
            }
            
            return false;
        }

        function handleDragEnd(e) {
            this.style.opacity = '1';
        }

        // 重建换算列表
        function rebuildConversionList() {
            const container = document.getElementById('conversion');
            container.innerHTML = '';

            displayCurrencies.forEach(code => {
                const row = document.createElement('div');
                row.className = 'conversion-row clickable';
                row.innerHTML = `
                    <div class="conversion-label">
                        <span class="currency-code">${code}</span>
                        <span class="currency-name">${allCurrencies[code]}</span>
                    </div>
                    <span class="conversion-value">0.00</span>
                `;
                row.onclick = () => switchToConvertedCurrency(code, 0);
                container.appendChild(row);
            });
        }

        // 页面加载时重建列表
        rebuildConversionList();
    </script>
</body>
</html>
