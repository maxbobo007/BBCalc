<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波波汇率计算器 v1.4.2 - BBCalc</title>
    <style>
        /* ── 主题变量 ── */
        :root {
            --bg:          #0e0d12;
            --surface:     #1c1b1f;
            --surface-c:   #2b2930;
            --surface-ch:  #36343b;
            --on-surface:  #e6e1e5;
            --on-sv:       #938f99;
            --outline:     rgba(202,196,208,0.08);
            --outline-v:   rgba(202,196,208,0.13);
            --primary:     #4285f4;
            --primary-c:   rgba(66,133,244,0.18);
            --on-pc:       #a8c7fa;
            --err-c:       rgba(255,100,80,0.15);
            --on-err:      #ffb4ab;
            --scroll:      rgba(202,196,208,0.18);
            color-scheme:  dark;
        }

        [data-theme="light"] {
            --bg:          #f3f3fa;
            --surface:     #ffffff;
            --surface-c:   #ededf4;
            --surface-ch:  #e2e1e8;
            --on-surface:  #1c1b1f;
            --on-sv:       #49454f;
            --outline:     rgba(73,69,79,0.09);
            --outline-v:   rgba(73,69,79,0.14);
            --primary:     #1a73e8;
            --primary-c:   rgba(26,115,232,0.1);
            --on-pc:       #1a4fa0;
            --err-c:       rgba(200,40,20,0.1);
            --on-err:      #b3261e;
            --scroll:      rgba(73,69,79,0.2);
            color-scheme:  light;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--on-surface);
            padding: 32px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            height: calc(100vh - 64px);
        }

        .calculator-panel {
            background: var(--surface);
            border-radius: 28px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid var(--outline);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--on-surface);
            letter-spacing: -0.3px;
        }

        .active-currency-badge {
            background: var(--primary-c);
            color: var(--on-pc);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .settings-btn {
            background: var(--surface-c);
            border: 1px solid var(--outline-v);
            border-radius: 50px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--on-sv);
            font-size: 17px;
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
        }

        .settings-btn:hover {
            background: var(--surface-ch);
            transform: rotate(45deg);
        }

        .currency-selector {
            background: var(--surface-c);
            border-radius: 14px;
            padding: 11px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--outline);
        }

        .currency-selector label {
            font-size: 12px;
            color: var(--on-sv);
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .currency-selector select {
            background: transparent;
            border: none;
            color: var(--on-pc);
            font-size: 15px;
            font-weight: 600;
            padding: 4px 8px;
            cursor: pointer;
            outline: none;
        }

        .currency-selector select option {
            background: var(--surface-c);
            color: var(--on-surface);
        }

        .display {
            background: var(--surface-c);
            border-radius: 20px;
            padding: 22px 26px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            border: 1px solid var(--outline);
        }

        .expression {
            color: var(--on-sv);
            font-size: 15px;
            margin-bottom: 6px;
            min-height: 18px;
            text-align: right;
            font-weight: 400;
        }

        .result {
            font-size: 50px;
            font-weight: 300;
            color: var(--on-surface);
            text-align: right;
            line-height: 1.1;
            letter-spacing: -1.5px;
            position: relative;
            transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
        }

        .result.flash { animation: flash 0.25s ease; }

        @keyframes flash {
            0%,100% { opacity: 1; }
            50% { opacity: 0.55; transform: scale(1.01); }
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 42px;
            background: var(--on-pc);
            margin-left: 4px;
            animation: blink 1s infinite;
            vertical-align: middle;
            border-radius: 2px;
        }

        @keyframes blink {
            0%,49% { opacity: 1; }
            50%,100% { opacity: 0; }
        }

        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 9px;
            flex: 1;
        }

        .calc-button {
            background: var(--surface-c);
            border: none;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.12s ease, transform 0.08s ease;
            color: var(--on-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            height: 66px;
            position: relative;
            overflow: hidden;
        }

        .calc-button:hover { background: var(--surface-ch); }
        .calc-button:active { transform: scale(0.95); }

        .calc-button.function {
            background: var(--surface-ch);
            color: var(--on-sv);
            font-size: 20px;
            font-weight: 500;
        }

        .calc-button.function:hover { background: var(--surface-ch); }

        .calc-button.operator {
            background: var(--primary-c);
            color: var(--on-pc);
            font-size: 26px;
        }

        .calc-button.operator:hover { background: var(--primary-c); filter: brightness(1.2); }

        .calc-button.equals {
            background: var(--primary);
            color: white;
        }

        .calc-button.equals:hover { filter: brightness(1.1); }

        .calc-button.zero { grid-column: span 2; }

        .calc-button.backspace {
            background: var(--err-c);
            color: var(--on-err);
            font-size: 20px;
        }

        .calc-button.backspace:hover { background: var(--err-c); filter: brightness(1.3); }

        .conversion-panel {
            background: var(--surface);
            border-radius: 28px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--outline);
        }

        .conversion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--outline);
        }

        .conversion-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--on-surface);
        }

        .search-box {
            background: var(--surface-c);
            border: 1px solid var(--outline-v);
            border-radius: 50px;
            padding: 9px 18px;
            color: var(--on-surface);
            font-size: 13px;
            width: 210px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus { border-color: var(--primary); }
        .search-box::placeholder { color: var(--on-sv); }

        .conversion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
            gap: 9px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .conversion-grid::-webkit-scrollbar { width: 4px; }
        .conversion-grid::-webkit-scrollbar-track { background: transparent; }
        .conversion-grid::-webkit-scrollbar-thumb {
            background: var(--scroll);
            border-radius: 10px;
        }

        .currency-card {
            background: var(--surface-c);
            border-radius: 16px;
            padding: 13px 16px;
            cursor: pointer;
            transition: background 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
            border: 1px solid var(--outline);
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .currency-card.dragging {
            opacity: 0;
            pointer-events: none;
        }

        .currency-card.drag-ghost {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
            transform: scale(1.04) rotate(1deg);
            opacity: 0.97;
            will-change: transform;
            transition: box-shadow 0.15s ease;
        }

        .drag-placeholder-el {
            border: 2px dashed var(--primary);
            background: var(--primary-c);
            border-radius: 18px;
            opacity: 0.5;
        }

        .currency-card:hover {
            background: var(--surface-ch);
            border-color: var(--outline-v);
            transform: translateY(-1px);
        }

        .currency-card:active { transform: translateY(0); cursor: grabbing; }

        .currency-card.pinned-card {
            border-color: var(--primary);
            background: var(--primary-c);
        }

        .currency-card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .pin-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            border-radius: 6px;
            opacity: 0.25;
            transition: opacity 0.2s, transform 0.2s, background 0.2s;
            line-height: 1;
            transform: rotate(45deg);
        }

        .pin-btn:hover { opacity: 0.7; background: var(--surface-ch); }
        .pin-btn.pinned {
            opacity: 1;
            transform: rotate(0deg);
            background: var(--primary-c);
            filter: drop-shadow(0 0 4px var(--primary));
        }

        .pinned-divider {
            grid-column: 1 / -1;
            height: 1px;
            background: var(--outline);
            margin: 2px 0;
        }

        .currency-card.active {
            border-color: var(--primary);
            background: var(--primary-c);
        }

        .currency-info { display: flex; flex-direction: column; gap: 2px; }

        .currency-code {
            font-size: 17px;
            font-weight: 600;
            color: var(--on-surface);
        }

        .currency-name {
            font-size: 11px;
            color: var(--on-sv);
        }

        .currency-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--on-pc);
            text-align: right;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }

        .rate-info {
            margin-top: auto;
            padding-top: 14px;
            text-align: center;
            color: var(--on-sv);
            font-size: 11px;
            line-height: 1.7;
        }

        .update-btn {
            background: none;
            border: 1px solid var(--primary-c);
            color: var(--on-pc);
            cursor: pointer;
            font-size: 11px;
            margin-top: 7px;
            padding: 5px 14px;
            border-radius: 50px;
            transition: background 0.2s, border-color 0.2s;
        }

        .update-btn:hover {
            background: var(--primary-c);
            border-color: var(--on-pc);
        }

        .settings-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.65);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(14px);
        }

        .settings-overlay.active { display: flex; }

        .settings-panel {
            background: var(--surface);
            border-radius: 28px;
            border: 1px solid var(--outline-v);
            width: 90%;
            max-width: 880px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 36px;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--outline);
        }

        .settings-title {
            font-size: 26px;
            font-weight: 600;
            color: var(--on-surface);
        }

        .close-btn {
            background: var(--surface-c);
            border: none;
            border-radius: 50px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--on-sv);
            font-size: 20px;
            transition: background 0.2s;
        }

        .close-btn:hover { background: var(--surface-ch); }

        .section-title {
            font-size: 11px;
            color: var(--on-sv);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 26px 0 12px;
            font-weight: 600;
        }

        .currency-grid-settings {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
            gap: 9px;
        }

        .currency-item {
            background: var(--surface-c);
            border-radius: 14px;
            padding: 13px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s;
            border: 1px solid var(--outline);
        }

        .currency-item:hover { background: var(--surface-ch); }

        .currency-item-info { display: flex; flex-direction: column; }

        .currency-item-code {
            font-size: 14px;
            font-weight: 600;
            color: var(--on-surface);
        }

        .currency-item-name {
            font-size: 11px;
            color: var(--on-sv);
        }

        .toggle-switch {
            position: relative;
            width: 46px;
            height: 26px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--surface-ch);
            transition: 0.25s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: var(--on-sv);
            transition: 0.25s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider { background-color: var(--primary); }
        input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background-color: white;
        }

        @media (max-width: 1200px) {
            .container { grid-template-columns: 380px 1fr; }
        }

        @media (max-width: 900px) {
            body { padding: 16px; }
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(300px, 40vh) 1fr;
                height: calc(100vh - 32px);
                gap: 14px;
            }
            .conversion-panel { order: -1; height: 100%; overflow: hidden; }
            .conversion-grid { max-height: calc(100% - 80px); }
            .calculator-panel { max-width: 100%; height: 100%; padding: 18px; }
            .title { font-size: 20px; }
            .calc-button { min-height: 52px; font-size: 20px; }
            .calc-button.function { font-size: 17px; }
            .calc-button.operator { font-size: 24px; }
            .result { font-size: 40px; }
        }

        @media (max-width: 600px) {
            .container { grid-template-rows: minmax(250px, 35vh) 1fr; }
            .calc-button { min-height: 46px; font-size: 19px; }
            .result { font-size: 34px; }
            .conversion-title { font-size: 16px; }
        }
    </style>
    <style>
        /* ── Material Design 动效增强 ── */

        /* 水波纹 Ripple */
        .calc-button {
            position: relative;
            overflow: hidden;
        }

        .md-ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: md-ripple-anim 0.55s linear;
            pointer-events: none;
            background: rgba(255,255,255,0.22);
        }

        @keyframes md-ripple-anim {
            to { transform: scale(5); opacity: 0; }
        }

        /* 按钮 hover 辉光 */
        .calc-button:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
        .calc-button.operator:hover { box-shadow: 0 4px 14px rgba(255,159,10,0.3); }
        .calc-button.equals:hover  { box-shadow: 0 4px 14px rgba(10,132,255,0.4); }
        .calc-button.backspace:hover { box-shadow: 0 4px 14px rgba(255,59,48,0.4); }

        /* 货币卡片入场动画 */
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1);    }
        }

        .currency-card {
            animation: cardEnter 0.28s cubic-bezier(0.2,0,0,1) both;
            backdrop-filter: blur(8px);
        }

        /* 汇率数值更新动画 */
        @keyframes valueSlideIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0);   }
        }

        .currency-value {
            animation: valueSlideIn 0.2s ease both;
        }

        /* 设置面板滑入 */
        @keyframes panelSlideUp {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }

        .settings-overlay.active .settings-panel {
            animation: panelSlideUp 0.3s cubic-bezier(0.2,0,0,1);
        }

        /* 置顶按钮弹跳 */
        @keyframes pinBounce {
            0%   { transform: scale(1) rotate(0deg); }
            40%  { transform: scale(1.5) rotate(-20deg); }
            70%  { transform: scale(0.9) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .pin-btn.bouncing {
            animation: pinBounce 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }

        /* 基准货币 badge 切换动画 */
        @keyframes badgeSwap {
            0%   { opacity: 0; transform: translateY(-6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .active-currency-badge.swapping {
            animation: badgeSwap 0.25s ease;
        }

        /* 结果数字切换动画 */
        @keyframes resultFade {
            from { opacity: 0.4; transform: scale(0.97); }
            to   { opacity: 1;   transform: scale(1);    }
        }

        .result.switching {
            animation: resultFade 0.2s ease;
        }

        .theme-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .theme-btn {
            flex: 1;
            padding: 10px 6px;
            border-radius: 12px;
            border: 1.5px solid var(--outline-v);
            background: var(--surface-c);
            color: var(--on-sv);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .theme-btn.active {
            background: var(--primary-c);
            color: var(--on-pc);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧计算器 -->
        <div class="calculator-panel">
            <div class="header">
                <div class="title">
                    波波汇率计算器
                    <span class="active-currency-badge" id="activeCurrencyBadge">CNY</span>
                </div>
                <button class="settings-btn" onclick="openSettings()">⚙️</button>
            </div>

            <div class="currency-selector">
                <label>基准货币</label>
                <select id="baseCurrency">
                    <option value="CNY" selected>CNY 人民币</option>
                    <option value="USD">USD 美元</option>
                    <option value="EUR">EUR 欧元</option>
                    <option value="GBP">GBP 英镑</option>
                    <option value="JPY">JPY 日元</option>
                    <option value="HKD">HKD 港币</option>
                </select>
            </div>

            <div class="display">
                <div class="expression" id="expression"></div>
                <div class="result" id="result">0</div>
            </div>

            <div class="calculator-buttons">
                <button class="calc-button function" onclick="clearCalc()">C</button>
                <button class="calc-button function" onclick="toggleSign()">+/−</button>
                <button class="calc-button function" onclick="percentage()">%</button>
                <button class="calc-button backspace" onclick="backspace()">⌫</button>

                <button class="calc-button" onclick="append('7')">7</button>
                <button class="calc-button" onclick="append('8')">8</button>
                <button class="calc-button" onclick="append('9')">9</button>
                <button class="calc-button operator" onclick="append('/')">÷</button>

                <button class="calc-button" onclick="append('4')">4</button>
                <button class="calc-button" onclick="append('5')">5</button>
                <button class="calc-button" onclick="append('6')">6</button>
                <button class="calc-button operator" onclick="append('*')">×</button>

                <button class="calc-button" onclick="append('1')">1</button>
                <button class="calc-button" onclick="append('2')">2</button>
                <button class="calc-button" onclick="append('3')">3</button>
                <button class="calc-button operator" onclick="append('-')">−</button>

                <button class="calc-button zero" onclick="append('0')">0</button>
                <button class="calc-button" onclick="append('.')">.</button>
                <button class="calc-button operator" onclick="append('+')">+</button>

                <button class="calc-button equals operator" onclick="calculate()" style="grid-column: span 4;">=</button>
            </div>

            <div class="rate-info" id="rateInfo">
                正在加载汇率...<br>
                <button class="update-btn" onclick="fetchRates()">手动更新</button>
            </div>
        </div>

        <!-- 右侧换算结果 -->
        <div class="conversion-panel">
            <div class="conversion-header">
                <div class="conversion-title">实时汇率换算</div>
                <input type="text" class="search-box" id="searchBox" placeholder="搜索货币..." onkeyup="filterCurrencies()">
            </div>

            <div class="conversion-grid" id="conversionGrid"></div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsIfOutside(event)">
        <div class="settings-panel" onclick="event.stopPropagation()">
            <div class="settings-header">
                <div class="settings-title">货币设置</div>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>

        }

        let exchangeRates = {
            USD: 1.0000, EUR: 0.9234, GBP: 0.7912, JPY: 149.32, CNY: 7.2445, HKD: 7.8095,
            AUD: 1.5486, CAD: 1.3891, SGD: 1.3502, KRW: 1338.45, CHF: 0.8812, SEK: 10.4823,
            NOK: 10.7956, DKK: 6.8534, NZD: 1.6523, MXN: 17.1234, BRL: 5.0923, INR: 83.1567,
            RUB: 92.3456, ZAR: 18.5632, THB: 35.4521, MYR: 4.6432, IDR: 15742.34, PHP: 56.7834,
            VND: 24487.56, TWD: 31.4523, TRY: 32.7845, SAR: 3.7512, AED: 3.6732, PLN: 4.0523,
            CZK: 23.1856, HUF: 359.87, ILS: 3.6523, CLP: 948.23, PKR: 277.89, EGP: 48.4523,
            ARS: 849.34, COP: 4097.56, PEN: 3.7423, UAH: 41.1834
        };

        const _savedDisplay = JSON.parse(localStorage.getItem('displayCurrencies'));
        // 如果保存的列表缺少 USD 或 EUR，视为损坏数据，重置为默认
        const _displayValid = _savedDisplay && _savedDisplay.length > 0
            && _savedDisplay.includes('USD') && _savedDisplay.includes('EUR');
        let displayCurrencies = _displayValid
            ? _savedDisplay : Object.keys(allCurrencies).filter(c => c !== 'CNY');
        if (!_displayValid) localStorage.removeItem('displayCurrencies');

        // 货币排序（保存用户拖拽的顺序）
        const _savedOrder = JSON.parse(localStorage.getItem('currencyOrder'));
        let currencyOrder = (_savedOrder && _savedOrder.length > 0) ? _savedOrder : displayCurrencies.slice();

        // 置顶货币
        let pinnedCurrencies = new Set(JSON.parse(localStorage.getItem('pinnedCurrencies')) || []);

        // 默认基准货币
        let defaultBaseCurrency = localStorage.getItem('defaultBaseCurrency') || 'CNY';

        // 格式化数字，添加千分符
        function formatNumber(num) {
            if (num === 0 || num === '' || isNaN(num)) return '0';
            const parts = num.toString().split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        // 计算器功能
        function append(value) {
            if (expression === '0' && value !== '.') {
                expression = value;
            } else {
                expression += value;
            }
            triggerFlash();
            updateDisplay();
        }

        function backspace() {
            if (expression.length > 0) {
                expression = expression.slice(0, -1);
                triggerFlash();
                updateDisplay();
            }
        }

        function triggerFlash() {
            const resultElement = document.getElementById('result');
            resultElement.classList.add('flash');
            setTimeout(() => {
                resultElement.classList.remove('flash');
            }, 300);
        }

        function clearCalc() {
            expression = '';
            result = 0;
            updateDisplay();
        }

        function toggleSign() {
            if (result !== 0) {
                result = -result;
                expression = result.toString();
                updateDisplay();
            }
        }

        function percentage() {
            if (result !== 0) {
                result = result / 100;
                expression = result.toString();
                updateDisplay();
            }
        }

        function calculate() {
            try {
                let calcExpression = expression
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');
                
                result = Function('"use strict"; return (' + calcExpression + ')')();
                
                if (!isFinite(result)) {
                    result = 0;
                    expression = '错误';
                } else {
                    expression = result.toString();
                }
            } catch (error) {
                result = 0;
                expression = '错误';
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('expression').textContent = expression || '';

            let currentValue = result;
            if (expression && expression !== '错误') {
                try {
                    let calcExpression = expression
                        .replace(/×/g, '*')
                        .replace(/÷/g, '/')
                        .replace(/−/g, '-');

                    currentValue = Function('"use strict"; return (' + calcExpression + ')')();
                    if (!isFinite(currentValue)) {
                        currentValue = 0;
                    }
                } catch (error) {
                    currentValue = 0;
                }
            }

            // 使用千分符格式化
            let displayValue;
            if (Math.abs(currentValue) >= 1e9) {
                displayValue = currentValue.toExponential(2);
            } else if (currentValue.toString().replace(/,/g, '').length > 12) {
                displayValue = formatNumber(parseFloat(currentValue.toFixed(2)));
            } else {
                displayValue = formatNumber(currentValue);
            }

            // 添加光标效果
            const resultElement = document.getElementById('result');
            if (expression && expression !== '错误') {
                resultElement.innerHTML = displayValue + '<span class="cursor"></span>';
            } else {
                resultElement.textContent = displayValue;
            }

            result = currentValue;

            updateConversion();
        }

        // 汇率换算
        async function fetchRates() {
            const rateInfo = document.getElementById('rateInfo');
            rateInfo.innerHTML = '更新中...<br><button class="update-btn" onclick="fetchRates()">手动更新</button>';

            // 根据用户选择构建API列表
            const APIs = preferredAPIs
                .map(key => availableAPIs[key])
                .filter(api => api); // 过滤掉无效的API

            if (APIs.length === 0) {
                console.log('没有启用任何API，使用离线汇率');
                usingOfflineRates = true;
                rateSource = '内置数据（未启用任何API）';
                lastUpdate = new Date();
                updateRateInfo();
                updateConversion();
                return;
            }

            let attemptedAPIs = [];

            for (let api of APIs) {
                attemptedAPIs.push(api.name);
                try {
                    // 使用Promise.race实现超时
                    const fetchPromise = fetch(api.url, { method: 'GET' });
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('请求超时（8秒）')), 8000)
                    );
                    
                    const response = await Promise.race([fetchPromise, timeoutPromise]);
                    
                    if (!response.ok) {
                        console.log(`✗ ${api.name} HTTP ${response.status}`);
                        continue;
                    }
                    
                    const data = await response.json();
                    const rates = api.parser(data);
                    
                    if (rates && Object.keys(rates).length > 10) {
                        // 成功获取汇率
                        // 规范化货币代码为大写
                        const normalizedRates = {};
                        Object.keys(rates).forEach(key => {
                            normalizedRates[key.toUpperCase()] = rates[key];
                        });
                        
                        exchangeRates = { ...exchangeRates, ...normalizedRates };
                        lastUpdate = new Date();
                        usingOfflineRates = false;
                        rateSource = api.name; // 记录来源
                        
                        updateRateInfo();
                        updateConversion();
                        
                        console.log(`✓ 成功从 ${api.name} 获取汇率`);
                        return;
                    } else {
                        console.log(`✗ ${api.name} 返回数据不完整`);
                    }
                } catch (error) {
                    console.log(`✗ ${api.name} 失败: ${error.message}`);
                    continue;
                }
            }
            
            // 所有API都失败，使用离线汇率
            console.log(`所有API都失败 (尝试了: ${attemptedAPIs.join(', ')})`);
            console.log('可能原因：网络限制、API服务器故障、或需要VPN访问');
            usingOfflineRates = true;
            rateSource = '内置数据 (2025-01)';
            lastUpdate = new Date();
            updateRateInfo();
            updateConversion();
        }

        function updateRateInfo() {
            const timeStr = lastUpdate.toLocaleString('zh-CN');
            const status = usingOfflineRates ? '离线汇率' : '实时汇率';
            const rateInfo = document.getElementById('rateInfo');
            rateInfo.innerHTML = `
                ${timeStr} (${status})<br>
                数据来源: <strong style="color: #0A84FF">${rateSource}</strong><br>
                <button class="update-btn" onclick="fetchRates()">手动更新</button>
            `;
        }

        function updateConversion() {
            const baseCurrency = document.getElementById('baseCurrency').value;
            const grid = document.getElementById('conversionGrid');

            // 补全：displayCurrencies 里有但 currencyOrder 里没有的货币追加到末尾
            displayCurrencies.forEach(c => { if (!currencyOrder.includes(c)) currencyOrder.push(c); });
            const filtered = currencyOrder.filter(c => displayCurrencies.includes(c) && c !== baseCurrency);
            const pinnedList = filtered.filter(c => pinnedCurrencies.has(c));
            const unpinnedList = filtered.filter(c => !pinnedCurrencies.has(c));

            // Check if we can just update values in-place (same cards, same order)
            const existingCards = [...grid.querySelectorAll('.currency-card')];
            const existingOrder = existingCards.map(c => c.dataset.currency);
            const newOrder = [...pinnedList, ...unpinnedList].filter(c => exchangeRates[c] || result === 0);

            const canUpdateInPlace = existingOrder.length === newOrder.length
                && existingOrder.every((c, i) => c === newOrder[i]);

            if (canUpdateInPlace && existingCards.length > 0) {
                // Just update the value text, no DOM rebuild
                const amountInUSD = (result !== 0 && exchangeRates[baseCurrency])
                    ? result / exchangeRates[baseCurrency] : null;
                existingCards.forEach(card => {
                    const currency = card.dataset.currency;
                    const valueEl = card.querySelector('.currency-value');
                    if (valueEl) {
                        const val = amountInUSD !== null && exchangeRates[currency]
                            ? amountInUSD * exchangeRates[currency] : null;
                        valueEl.textContent = val !== null
                            ? val.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                            : '0.00';
                        // Update onclick with fresh value for swap
                        card.onclick = () => switchToConvertedCurrency(currency, val !== null ? val : 0);
                    }
                });
                return;
            }

            // Full rebuild (currency list/order/pinned changed)
            grid.innerHTML = '';
            let _cardIndex = 0;

            function createCard(currency, value) {
                const isPinned = pinnedCurrencies.has(currency);
                const card = document.createElement('div');
                card.className = 'currency-card'
                    + (currency === activeCurrency ? ' active' : '')
                    + (isPinned ? ' pinned-card' : '');
                card.style.cursor = 'grab';
                card.dataset.currency = currency;
                card.onclick = () => switchToConvertedCurrency(currency, value !== null ? value : 0);
                card.style.animationDelay = `${_cardIndex * 28}ms`;
                _cardIndex++;

                const displayVal = value !== null
                    ? value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                    : '0.00';

                card.innerHTML = `
                    <div class="currency-info">
                        <div class="currency-code">${currencyFlags[currency] || ''} ${currency}</div>
                        <div class="currency-name">${getCurrencyName(currency)}</div>
                    </div>
                    <div class="currency-card-right">
                        <button class="pin-btn ${isPinned ? 'pinned' : ''}" data-currency="${currency}" onclick="togglePin('${currency}', event)" title="${isPinned ? '取消置顶' : '置顶'}">📌</button>
                        <div class="currency-value">${displayVal}</div>
                    </div>
                `;
                addDragListeners(card);
                return card;
            }

            function appendDivider() {
                if (pinnedList.length > 0 && unpinnedList.length > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'pinned-divider';
                    grid.appendChild(divider);
                }
            }

            if (result !== 0 && exchangeRates[baseCurrency]) {
                const amountInUSD = result / exchangeRates[baseCurrency];
                pinnedList.forEach(currency => {
                    if (exchangeRates[currency]) {
                        grid.appendChild(createCard(currency, amountInUSD * exchangeRates[currency]));
                    }
                });
                appendDivider();
                unpinnedList.forEach(currency => {
                    if (exchangeRates[currency]) {
                        grid.appendChild(createCard(currency, amountInUSD * exchangeRates[currency]));
                    }
                });
            } else {
                pinnedList.forEach(currency => grid.appendChild(createCard(currency, null)));
                appendDivider();
                unpinnedList.forEach(currency => grid.appendChild(createCard(currency, null)));
            }
        }

        // ── 拖拽排序（pointer events + FLIP 让位动画）──
        let dragState = null;

        function addDragListeners(card) {
            card.addEventListener('pointerdown', onDragStart);
        }

        function flipCards(grid, fn) {
            // FLIP: 记录位置 → 执行 DOM 变化 → 动画回到新位置
            const cards = [...grid.querySelectorAll('.currency-card:not(.dragging)')];
            const first = new Map(cards.map(c => [c, c.getBoundingClientRect()]));
            fn();
            cards.forEach(c => {
                const f = first.get(c);
                const l = c.getBoundingClientRect();
                const dy = f.top - l.top;
                const dx = f.left - l.left;
                if (Math.abs(dy) > 0.5 || Math.abs(dx) > 0.5) {
                    c.style.transition = 'none';
                    c.style.transform = `translate(${dx}px,${dy}px)`;
                    requestAnimationFrame(() => {
                        c.style.transition = 'transform 0.2s ease';
                        c.style.transform = '';
                    });
                }
            });
        }

        function onDragStart(e) {
            if (e.target.closest('.pin-btn')) return;
            if (e.button !== undefined && e.button !== 0) return;

            const card = e.currentTarget;
            const rect = card.getBoundingClientRect();
            const grid = document.getElementById('conversionGrid');

            // 占位符撑住原来的空间
            const placeholder = document.createElement('div');
            placeholder.className = 'drag-placeholder-el currency-card';
            placeholder.style.height = rect.height + 'px';
            grid.insertBefore(placeholder, card);

            // ghost 跟手
            const ghost = card.cloneNode(true);
            ghost.classList.add('drag-ghost');
            ghost.style.width = rect.width + 'px';
            ghost.style.left  = rect.left  + 'px';
            ghost.style.top   = rect.top   + 'px';
            document.body.appendChild(ghost);
            card.classList.add('dragging');

            dragState = {
                card, ghost, placeholder, grid,
                offsetX: e.clientX - rect.left,
                offsetY: e.clientY - rect.top,
                currency: card.dataset.currency,
                overCard: null, rafId: null,
                lastX: e.clientX, lastY: e.clientY,
            };

            card.setPointerCapture(e.pointerId);
            card.addEventListener('pointermove', onDragMove);
            card.addEventListener('pointerup',   onDragEnd);
            card.addEventListener('pointercancel', onDragEnd);
        }

        function onDragMove(e) {
            if (!dragState) return;
            dragState.lastX = e.clientX;
            dragState.lastY = e.clientY;
            if (!dragState.rafId) dragState.rafId = requestAnimationFrame(rafDrag);
        }

        function rafDrag() {
            if (!dragState) return;
            dragState.rafId = null;
            const { ghost, offsetX, offsetY, card, placeholder, grid, lastX, lastY } = dragState;

            ghost.style.left = (lastX - offsetX) + 'px';
            ghost.style.top  = (lastY - offsetY) + 'px';

            ghost.style.visibility = 'hidden';
            const target = document.elementFromPoint(lastX, lastY)?.closest('.currency-card:not(.dragging):not(.drag-placeholder-el)');
            ghost.style.visibility = '';

            if (target && target !== dragState.overCard) {
                dragState.overCard = target;
                // FLIP: 把占位符移到目标卡片前/后
                const pIdx = [...grid.children].indexOf(placeholder);
                const tIdx = [...grid.children].indexOf(target);
                flipCards(grid, () => {
                    if (tIdx > pIdx) grid.insertBefore(placeholder, target.nextSibling);
                    else             grid.insertBefore(placeholder, target);
                });
            }
        }

        function onDragEnd(e) {
            if (!dragState) return;
            if (dragState.rafId) cancelAnimationFrame(dragState.rafId);
            const { card, ghost, currency, placeholder, grid } = dragState;

            const gridChildren = [...grid.children];
            const placeholderIdx = gridChildren.indexOf(placeholder);

            // 占位符后面那张卡就是插入目标
            const nextCard = gridChildren
                .slice(placeholderIdx + 1)
                .find(el => el.dataset.currency);
            const nextCurrency = nextCard?.dataset.currency || null;

            // 判断落点区域：占位符前面是否有未置顶的卡片？有则在普通区，无则在置顶区
            const unpinnedBefore = gridChildren
                .slice(0, placeholderIdx)
                .filter(el => el.dataset.currency && !el.classList.contains('dragging') && !pinnedCurrencies.has(el.dataset.currency))
                .length;
            const dropInPinnedZone = unpinnedBefore === 0;

            placeholder.remove();
            ghost.remove();
            card.classList.remove('dragging');
            card.style.transition = '';
            card.style.transform  = '';

            card.removeEventListener('pointermove', onDragMove);
            card.removeEventListener('pointerup',   onDragEnd);
            card.removeEventListener('pointercancel', onDragEnd);

            dragState = null;

            // 根据落点区域自动置顶/取消置顶
            if (dropInPinnedZone) {
                pinnedCurrencies.add(currency);
            } else {
                pinnedCurrencies.delete(currency);
            }
            localStorage.setItem('pinnedCurrencies', JSON.stringify([...pinnedCurrencies]));

            // 简单 splice：从原位移出，插到目标前（或末尾）
            const from = currencyOrder.indexOf(currency);
            if (from !== -1) currencyOrder.splice(from, 1);
            if (nextCurrency) {
                const to = currencyOrder.indexOf(nextCurrency);
                if (to !== -1) currencyOrder.splice(to, 0, currency);
                else currencyOrder.push(currency);
            } else {
                currencyOrder.push(currency);
            }
            localStorage.setItem('currencyOrder', JSON.stringify(currencyOrder));
            if (window.saveToCloud) saveToCloud();
            updateConversion();
        }

        function switchToConvertedCurrency(currency, value) {
            const oldBase = document.getElementById('baseCurrency').value;
            if (currency === oldBase) return;

            // 互换位置：将旧基准货币放到被点击货币的位置
            // 先移除旧基准货币（避免用户在设置里手动启用它时产生重复）
            const oldBaseInOrder = currencyOrder.indexOf(oldBase);
            if (oldBaseInOrder !== -1) {
                currencyOrder.splice(oldBaseInOrder, 1);
            }
            const clickedIndex = currencyOrder.indexOf(currency);
            if (clickedIndex !== -1) {
                currencyOrder[clickedIndex] = oldBase;
            } else {
                currencyOrder.push(oldBase);
            }
            localStorage.setItem('currencyOrder', JSON.stringify(currencyOrder));
            if (window.saveToCloud) saveToCloud();

            // 切换基准货币
            document.getElementById('baseCurrency').value = currency;
            activeCurrency = currency;
            document.getElementById('activeCurrencyBadge').textContent = currency;
            animateBadge();

            // 如果有计算结果，更新显示值为换算后的金额
            if (value !== 0) {
                result = value;
                expression = value.toFixed(2);
                document.getElementById('result').textContent = value.toFixed(2);
                document.getElementById('expression').textContent = '';
            }

            updateConversion();
        }

        function togglePin(currency, event) {
            event.stopPropagation();
            const wasPinned = pinnedCurrencies.has(currency);
            if (wasPinned) pinnedCurrencies.delete(currency);
            else pinnedCurrencies.add(currency);
            localStorage.setItem('pinnedCurrencies', JSON.stringify([...pinnedCurrencies]));
            if (window.saveToCloud) saveToCloud();

            const grid = document.getElementById('conversionGrid');
            const card = grid.querySelector(`.currency-card[data-currency="${currency}"]`);
            if (!card) { updateConversion(); return; }

            // 只更新这一张卡的样式，不重建整个列表
            card.classList.toggle('pinned-card', !wasPinned);
            const btn = card.querySelector('.pin-btn');
            if (btn) {
                btn.classList.toggle('pinned', !wasPinned);
                btn.title = wasPinned ? '置顶' : '取消置顶';
            }

            // 用 FLIP 把卡片移到正确区域
            flipCards(grid, () => {
                const divider = grid.querySelector('.pinned-divider');
                if (wasPinned) {
                    // 取消置顶：移到分割线后面（普通区开头）
                    if (divider) grid.insertBefore(card, divider.nextSibling);
                } else {
                    // 置顶：移到分割线前面（置顶区末尾）
                    if (divider) grid.insertBefore(card, divider);
                    else grid.insertBefore(card, grid.firstChild);
                }
                // 同步分割线：有置顶且有普通卡时才显示
                const cards = [...grid.querySelectorAll('.currency-card')];
                const hasPinned   = cards.some(c => pinnedCurrencies.has(c.dataset.currency));
                const hasUnpinned = cards.some(c => !pinnedCurrencies.has(c.dataset.currency));
                let existingDivider = grid.querySelector('.pinned-divider');
                if (hasPinned && hasUnpinned) {
                    if (!existingDivider) {
                        const firstUnpinned = cards.find(c => !pinnedCurrencies.has(c.dataset.currency));
                        if (firstUnpinned) {
                            existingDivider = document.createElement('div');
                            existingDivider.className = 'pinned-divider';
                            grid.insertBefore(existingDivider, firstUnpinned);
                        }
                    }
                } else if (existingDivider) {
                    existingDivider.remove();
                }
            });

            // 弹跳动画
            if (btn) {
                btn.classList.remove('bouncing');
                void btn.offsetWidth;
                btn.classList.add('bouncing');
                btn.addEventListener('animationend', () => btn.classList.remove('bouncing'), { once: true });
            }
        }

        // 搜索过滤
        function filterCurrencies() {
            const searchText = document.getElementById('searchBox').value.toLowerCase();
            const cards = document.querySelectorAll('.currency-card');
            
            cards.forEach(card => {
                const code = card.querySelector('.currency-code').textContent.toLowerCase();
                const name = card.querySelector('.currency-name').textContent.toLowerCase();
                
                if (code.includes(searchText) || name.includes(searchText)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // 设置功能
        function openSettings() {
            applyTheme(themeMode);
            // 验证并修复配置
            const oldLength = preferredAPIs.length;
            preferredAPIs = preferredAPIs.filter(key => availableAPIs[key]);
            
            if (preferredAPIs.length === 0) {
                preferredAPIs = ['currencyapi', 'exchangerate', 'frankfurter'];
                localStorage.setItem('preferredAPIs', JSON.stringify(preferredAPIs));
            } else if (oldLength !== preferredAPIs.length) {
                localStorage.setItem('preferredAPIs', JSON.stringify(preferredAPIs));
                console.log('已清理无效的API配置');
            }
            
            document.getElementById('settingsOverlay').classList.add('active');
            renderSettings();
        }

        function closeSettings() {
            document.getElementById('settingsOverlay').classList.remove('active');
        }

        function closeSettingsIfOutside(event) {
            if (event.target.id === 'settingsOverlay') {
                closeSettings();
            }
        }

        function setDefaultCurrency(currency) {
            defaultBaseCurrency = currency;
            localStorage.setItem('defaultBaseCurrency', currency);
            if (window.saveToCloud) saveToCloud();
            document.getElementById('baseCurrency').value = currency;
            activeCurrency = currency;
            document.getElementById('activeCurrencyBadge').textContent = currency;
            updateConversion();
        }

        function renderSettings() {
            // 填充默认货币下拉列表
            const defaultCurrencySelect = document.getElementById('defaultCurrencySelect');
            if (defaultCurrencySelect) {
                defaultCurrencySelect.innerHTML = '';
                Object.keys(allCurrencies).forEach(code => {
                    const option = document.createElement('option');
                    option.value = code;
                    option.textContent = `${currencyFlags[code] || ''} ${code} - ${getCurrencyName(code)}`;
                    if (code === defaultBaseCurrency) {
                        option.selected = true;
                    }
                    defaultCurrencySelect.appendChild(option);
                });
            }

            // 渲染API选择
            const apiGrid = document.getElementById('apiGridSettings');
            if (apiGrid) {
                apiGrid.innerHTML = '';

                Object.keys(availableAPIs).forEach(key => {
                    const api = availableAPIs[key];
                    const priority = preferredAPIs.indexOf(key);
                    const isEnabled = priority !== -1;

                    const item = document.createElement('div');
                    item.className = 'currency-item';
                    item.innerHTML = `
                        <div class="currency-item-info">
                            <div class="currency-item-code">${api.name}</div>
                            <div class="currency-item-name">${api.description}</div>
                            ${api.note ? `<div style="font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 2px;">${api.note}</div>` : ''}
                            ${isEnabled ? `<div style="font-size: 11px; color: #0A84FF; margin-top: 4px; font-weight: 600;">优先级: ${priority + 1}</div>` : ''}
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" ${isEnabled ? 'checked' : ''}
                                   onchange="toggleAPI('${key}', this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                    `;
                    apiGrid.appendChild(item);
                });
            }

            // 渲染货币选择（已启用的在前，未启用的在后）
            const grid = document.getElementById('currencyGridSettings');
            grid.innerHTML = '';

            // 分离已启用和未启用的货币
            const enabledCurrencies = [];
            const disabledCurrencies = [];

            Object.keys(allCurrencies).forEach(code => {
                if (displayCurrencies.includes(code)) {
                    enabledCurrencies.push(code);
                } else {
                    disabledCurrencies.push(code);
                }
            });

            // 先渲染已启用的货币
            [...enabledCurrencies, ...disabledCurrencies].forEach(code => {
                const item = document.createElement('div');
                item.className = 'currency-item';
                item.setAttribute('data-currency-code', code);
                item.setAttribute('data-currency-name', getCurrencyName(code).toLowerCase());
                item.innerHTML = `
                    <div class="currency-item-info">
                        <div class="currency-item-code">${currencyFlags[code] || ''} ${code}</div>
                        <div class="currency-item-name">${getCurrencyName(code)}</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" ${displayCurrencies.includes(code) ? 'checked' : ''}
                               onchange="toggleCurrency('${code}', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                `;
                grid.appendChild(item);
            });
        }

        // 货币搜索过滤
        function filterCurrenciesInSettings() {
            const searchText = document.getElementById('currencySearchBox').value.toLowerCase();
            const items = document.querySelectorAll('#currencyGridSettings .currency-item');

            items.forEach(item => {
                const code = item.getAttribute('data-currency-code').toLowerCase();
                const name = item.getAttribute('data-currency-name');

                if (code.includes(searchText) || name.includes(searchText)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function toggleAPI(key, isEnabled) {
            if (isEnabled && !preferredAPIs.includes(key)) {
                preferredAPIs.push(key);
            } else if (!isEnabled) {
                preferredAPIs = preferredAPIs.filter(k => k !== key);
            }
            
            localStorage.setItem('preferredAPIs', JSON.stringify(preferredAPIs));
            renderSettings();
        }

        function toggleCurrency(code, isChecked) {
            if (isChecked && !displayCurrencies.includes(code)) {
                displayCurrencies.push(code);
                // 添加到排序列表
                if (!currencyOrder.includes(code)) {
                    currencyOrder.push(code);
                    localStorage.setItem('currencyOrder', JSON.stringify(currencyOrder));
                }
            } else if (!isChecked) {
                displayCurrencies = displayCurrencies.filter(c => c !== code);
            }

            localStorage.setItem('displayCurrencies', JSON.stringify(displayCurrencies));
            if (window.saveToCloud) saveToCloud();
            updateConversion();
            // 重新渲染设置以更新置顶
            renderSettings();
        }

        // 键盘支持
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;

            if (e.key >= '0' && e.key <= '9') {
                append(e.key);
            } else if (e.key === '.') {
                append('.');
            } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                append(e.key);
            } else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearCalc();
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                e.preventDefault();
                backspace();
            } else if (e.key === '%') {
                percentage();
            }
        });

        document.getElementById('baseCurrency').addEventListener('change', function() {
            activeCurrency = this.value;
            document.getElementById('activeCurrencyBadge').textContent = activeCurrency;
            updateConversion();
        });

        // 初始化
        populateBaseCurrencySelect();
        document.getElementById('baseCurrency').value = defaultBaseCurrency;
        activeCurrency = defaultBaseCurrency;
        document.getElementById('activeCurrencyBadge').textContent = defaultBaseCurrency;

        setLanguage(currentLang);
        updateDisplay();
        updateConversion();
        fetchRates();

        // ── Material 水波纹 Ripple ──
        function attachRipple(btn) {
            btn.addEventListener('click', function(e) {
                const existing = btn.querySelector('.md-ripple');
                if (existing) existing.remove();
                const circle = document.createElement('span');
                const d = Math.max(btn.clientWidth, btn.clientHeight);
                const rect = btn.getBoundingClientRect();
                circle.className = 'md-ripple';
                circle.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX - rect.left - d/2}px;top:${e.clientY - rect.top - d/2}px`;
                btn.appendChild(circle);
                circle.addEventListener('animationend', () => circle.remove());
            });
        }
        document.querySelectorAll('.calc-button').forEach(attachRipple);

        // badge 切换动画
        function animateBadge() {
            const badge = document.getElementById('activeCurrencyBadge');
            badge.classList.remove('swapping');
            void badge.offsetWidth;
            badge.classList.add('swapping');
            badge.addEventListener('animationend', () => badge.classList.remove('swapping'), { once: true });
        }

        console.log('=== 波波汇率计算器 BBCalc v1.4.2 ===');
    </script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDW1uBBGZsD1pTEa2wjdEYvXRusDSvu-Qg",
            authDomain: "bbcalc-ad997.firebaseapp.com",
            projectId: "bbcalc-ad997",
            storageBucket: "bbcalc-ad997.firebasestorage.app",
            messagingSenderId: "751427436528",
            appId: "1:751427436528:web:a0e646eb6bfe10badd2735"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let syncTimeout = null;

        // 读取云端配置并应用
        async function loadFromCloud(uid) {
            try {
                const snap = await getDoc(doc(db, 'users', uid, 'config', 'settings'));

                if (!snap.exists()) {
                    saveToCloud();
                    return;
                }

                const data = snap.data();

                // currencyOrder：用云端顺序
                const cloudOrder = data.currencyOrder || [];
                if (cloudOrder.length > 0) {
                    localStorage.setItem('currencyOrder', JSON.stringify(cloudOrder));
                }

                if (data.pinnedCurrencies) localStorage.setItem('pinnedCurrencies', JSON.stringify(data.pinnedCurrencies));
                if (data.themeMode)        localStorage.setItem('themeMode',          data.themeMode);
                if (data.appLanguage)      localStorage.setItem('appLanguage',         data.appLanguage);
                if (data.defaultCurrency)  localStorage.setItem('defaultBaseCurrency', data.defaultCurrency);

                // 重新加载以应用配置（防止循环 reload）
                if (!sessionStorage.getItem('cloudLoaded')) {
                    sessionStorage.setItem('cloudLoaded', '1');
                    location.reload();
                }
            } catch(e) { console.warn('云端读取失败', e); }
        }

        // 保存到云端（防抖 2 秒），直接读 localStorage 保证数据准确
        window.saveToCloud = function() {
            if (!currentUser) return;
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                try {
                    const currencyOrder     = JSON.parse(localStorage.getItem('currencyOrder'))    || [];
                    const pinnedCurrencies  = JSON.parse(localStorage.getItem('pinnedCurrencies')) || [];
                    await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), {
                        currencyOrder,
                        pinnedCurrencies,
                        themeMode:       localStorage.getItem('themeMode')           || 'auto',
                        appLanguage:     localStorage.getItem('appLanguage')          || 'zh',
                        defaultCurrency: localStorage.getItem('defaultBaseCurrency')  || 'CNY',
                        updatedAt:       Date.now()
                    });
                } catch(e) { console.warn('云端保存失败', e); }
            }, 2000);
        };

        // 登录状态变化
        onAuthStateChanged(auth, async user => {
            currentUser = user;
            const signedOut = document.getElementById('authSignedOut');
            const signedIn  = document.getElementById('authSignedIn');
            if (user) {
                signedOut.style.display = 'none';
                signedIn.style.display  = 'flex';
                document.getElementById('userAvatar').src = user.photoURL || '';
                document.getElementById('userName').textContent = user.displayName || '';
                document.getElementById('userEmail').textContent = user.email || '';
                await loadFromCloud(user.uid);
            } else {
                signedOut.style.display = 'flex';
                signedIn.style.display  = 'none';
            }
        });

        window.forceSyncToCloud = async function() {
            if (!currentUser) return;
            const btn = document.getElementById('forceSyncBtn');
            const orig = btn.textContent;
            btn.textContent = '同步中...';
            btn.disabled = true;
            try {
                const currencyOrder     = JSON.parse(localStorage.getItem('currencyOrder'))    || [];
                const pinnedCurrencies  = JSON.parse(localStorage.getItem('pinnedCurrencies')) || [];
                const displayCurrencies = JSON.parse(localStorage.getItem('displayCurrencies'))|| [];
                await setDoc(doc(db, 'users', currentUser.uid, 'config', 'settings'), {
                    currencyOrder,
                    pinnedCurrencies,
                    themeMode:       localStorage.getItem('themeMode')          || 'auto',
                    appLanguage:     localStorage.getItem('appLanguage')         || 'zh',
                    defaultCurrency: localStorage.getItem('defaultBaseCurrency') || 'CNY',
                    updatedAt:       Date.now()
                });
                btn.textContent = '✓ 已同步';
                setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
            } catch(e) {
                btn.textContent = '同步失败';
                setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
            }
        };

        window.signInWithGoogle = async function() {
            try { await signInWithPopup(auth, provider); }
            catch(e) { console.error('登录失败', e); }
        };

        window.signOutUser = async function() {
            await signOut(auth);
        };
    </script>
