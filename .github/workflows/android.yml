name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Ensure Android SDK components
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0" > /dev/null || true

      - name: Build signed release APK
        run: gradle assembleRelease --no-daemon
        working-directory: android

      - name: Collect APK
        run: |
          VERSION=$(grep -oP 'versionName "\K[^"]+' android/app/build.gradle)
          cp android/app/build/outputs/apk/release/app-release.apk "BBCalc-v${VERSION}-android.apk"
          echo "APK_NAME=BBCalc-v${VERSION}-android.apk" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbcalc-android-apk
          path: ${{ env.APK_NAME }}

      - name: Attach to rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: 'Android APK（滚动更新）'
          body: |
            原生安卓版（Kotlin + Jetpack Compose），核心逻辑与网页版一致，不依赖浏览器、离线可用。

            安装：下载 APK → 手机上打开 → 允许安装未知来源应用。旧版（TWA）可直接覆盖升级。
            签名说明见 android/README.md。
          prerelease: true
          files: ${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
